database:
  user: some_user
  host: localhost

paper_equity_eur: 1000

bitvavo:
  websocket_url: "wss://ws.bitvavo.com/v2/"
  pairs:
    - BTC-EUR
    - ETH-EUR
    - XRP-EUR
    - DOGE-EUR
    - SOL-EUR
    - ADA-EUR
    - TRX-EUR
    - SPX-EUR
    - BNB-EUR
    - XVG-EUR
    - LTC-EUR
    - XLM-EUR
    - PEPE-EUR
    - LINK-EUR
    - UNI-EUR
    - ATOM-EUR

# [OPTIONEEL, net als voorheen]
intervals:
  - "5m"
  - "15m"
  - "1h"
  - "4h"
  - "1d"

kraken:
  # <--- Nieuwe opzet: alleen 'pairs' en intervals.
  # Als je private WS wilt, kun je hier ook 'apiKey: ...' en 'apiSecret: ...' toevoegen.
  pairs:
    - XBT-EUR
    - ETH-EUR
    - XRP-EUR
    - XDG-EUR
    - ADA-EUR
    - SOL-EUR
    - DOT-EUR
    - POL-EUR
    - TRX-EUR
    - LTC-EUR
    - LINK-EUR
    - XLM-EUR
    - UNI-EUR
    - ATOM-EUR
    - ALGO-EUR
    - AAVE-EUR
    - ETC-EUR
    - SAND-EUR
    - AVAX-EUR
    - BCH-EUR

  # intervals
  intervals_realtime:
    - 15
  intervals_poll:
    - 5
    - 15
    - 60
    - 240
    - 1440
  poll_interval_seconds: 30

### MELTDOWN MANAGER ###
meltdown_manager:
  enabled: true
  meltdown_check_cooldown_s: 600
  daily_loss_pct: 30              # meltdown als daily portfolio drop >= 20%
  flash_crash_pct: 20             # meltdown als >=2 coins > 20% daling
  rsi_reentry_threshold: 30       # meltdown eindigt als RSI > 30
  meltdown_coins: ["XBT-EUR", "XRP-EUR", "ETH-EUR"]   # barometer
  meltdown_coins_needed: 2        # min. 2 coins in meltdown_coins >= flash_crash_pct => meltdown
  meltdown_tf: "5m"               # timeframe voor flash crash check
  meltdown_lookback: 3            # #candles om te vergelijken (bv. 3x 5m => ~15m)

### TREND STRATEGY 4H ###
trend_strategy_4h:
  strategy_name: "trend_4h"
  enabled: true                # eerst uit, straks aan
  trading_mode: "dryrun"        # "watch" | "auto" | "dryrun"
  log_file: "logs/trend_strategy_4h.log"
  intra_log_verbose: true
  require_fresh_price: false   # keep false while you’re away

  # Timeframes
  trend_timeframe: "4h"         # richting & trend-structuur
  entry_timeframe: "1h"         # timing/trigger

  # Trend & momentum filters (tighten slightly)
  use_adx_filter: true
  adx_entry_tf_threshold: 22        # was 20
  use_adx_multitimeframe: true
  adx_high_tf_threshold: 22         # was 20
  adx_high_tf_hard_skip_threshold: 16
  use_adx_directional_filter: true
  adx_window: 14
  adx_check_timeframes: [ "1h","4h" ]
  adx_logic: "both"                 # was "either" → demand trend on both TFs
  require_di_alignment: true

  # EMA-structuur (klassiek trend-volgen)
  ema_fast: 20
  ema_slow: 50
  require_trend_stack: true     # prijs boven fast>slow voor long; onder voor short

  # NEW — optional high-TF trend gate
  use_ema_trend_200: true
  ema_trend_period: 200

  # Optional: Supertrend gate (we vullen later in)
  use_supertrend: true
  supertrend_period: 10
  supertrend_multiplier: 3.0

  # Risk / positionering (zelfde stijl als pullback)
  atr_window: 14
  atr_timeframe_for_risk: "1h"     # "1h" (entry TF). Later kun je "4h" of "5m" testen.
  sl_atr_mult: 1.3
  tp1_atr_mult: 2.0
  tp1_portion_pct: 0.50
  trailing_atr_mult: 0.9

  # 👉 NIEUW: basis-inzet in EUR
  base_min_eur: 10.0          # minimaal €10 per trade
  base_max_eur: 25.0          # maximaal €25 per trade
  use_risk_multiplier: true   # straks via coin_profile.risk_multiplier

  # NEW – add these (we’ll wire them in code below)
  breakeven_after_tp1: true         # move stop to BE after TP1
  max_hold_hours: 18                # time-stop to avoid dead trades
  time_stop_action: "breakeven"     # "breakeven" or "close"

  # Intra-candle exit checks (jij hebt al ~30s in executor)
  exit_check_intra_seconds: 30

  # Limieten
  min_lot_multiplier: 2.1
  max_position_pct: 0.05
  max_position_eur: 20

  # LLM gate kan later hier ook op aan
  fee_rate: 0.0035
  use_llm_guard: false
  llm_model: "gpt-4.1-mini"
  llm_timeout_sec: 4

  flip_early:
    enabled: true
    hl_pivot_window: 5     # 1h HL/LH pivot window
    ema_fast: 20
    ema_slow: 50
    recent_cross_lookback_h4: 3   # bars to call it "flip_early"

  sentiment:
    macro_provider: "fear_greed"   # of "dummy"
    http_timeout_sec: 4

  sideways_filter:
    enabled: true

    # 1) ADX drempels
    adx_1h_threshold: 20      # hieronder = zwak
    adx_4h_threshold: 20

    # 2) EMA20–EMA50 compressie (percentage t.o.v. prijs)
    use_ema_compression: true
    ema_compress_max_pct: 0.004   # 0.4% van de prijs

    # 3) ATR%-filter (True Range)
    use_atr_filter: true
    atr_min_tr_pct: 0.006         # ATR/price < 0.6% = te stil

    # Extra: minimaal aantal bars om dit serieus te nemen
    min_history_bars: 50          # bijvoorbeeld op 1h en 4h

  # Cooldown na verlies
  cooldown_enabled: true
  cooldown_losing_trades: 1   # na 1 verliestrade → cooldown
  cooldown_hours: 4           # 4 uur geen nieuwe entries voor die coin

  # ============ ANALYZER SETTINGS ============
analysis:
  enabled: true
  run_interval_hours: 24        # later misschien 4 of 6
  hold_eval_interval: "5m"      # dit gebruiken we al
  hold_lookahead_hours: 8
  hold_missed_move_pct: 2.0

  # --- Confirms ---
  volume_confirm:
    enabled: true
    mult: 1.50                   # Vol >= mult * SMA20(Vol) was 1.2
    min_bars: 20                 # need at least 20 completed bars; else skip this confirm

  candle_quality:
    enabled: true
    body_atr_min: 0.80           # Body >= 0.60 * ATR(1h)
    wick_body_max: 0.80          # Long: upper_wick/body <= 1.0 ; Short: lower_wick/body <= 1.0


telegram:
  enabled: true
  bot_token: TELEGRAM_BOT_TOKEN
  chat_id: 8256312700

notifier:
  enabled: true
  chat_id: TELEGRAM_CHAT_ID        # <- yours
  token_env: TELEGRAM_BOT_TOKEN


